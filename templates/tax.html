<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Tax Management</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
<style>
body { background:#f8f9fa; font-size:14px; }
.topbar { background:#1e293b; color:#f1f5f9; padding:10px 20px; display:flex; align-items:center; gap:16px; }
.topbar a { color:#94a3b8; text-decoration:none; font-size:12px; }
.topbar a:hover { color:#f1f5f9; }
.topbar-title { font-size:15px; font-weight:600; color:#f1f5f9; }
.tax-tabs { display:flex; background:#fff; border-bottom:1px solid #e2e8f0; padding:0 20px; gap:4px; align-items:center; }
.tax-tab { padding:11px 18px; font-size:13px; font-weight:500; color:#64748b; border-bottom:2px solid transparent; cursor:pointer; white-space:nowrap; text-decoration:none; display:inline-block; }
.tax-tab:hover { color:#1e3a5f; }
.tax-tab.active { color:#1e3a5f; border-bottom-color:#1e3a5f; }
.content-area { padding:24px 20px; max-width:1100px; margin:0 auto; }
.del-btn { background:none; border:none; color:#dc2626; cursor:pointer; padding:0 6px; font-size:13px; opacity:0.5; }
.del-btn:hover { opacity:1; }
</style>
</head>
<body>

<div class="topbar">
  <a href="/home"><i class="bi bi-house me-1"></i>Home</a>
  <span style="color:#475569;">›</span>
  <span class="topbar-title"><i class="bi bi-receipt-cutoff me-2"></i>Tax Management</span>
  <span style="margin-left:auto;font-size:11px;color:#64748b;">{{ user }}</span>
</div>

<div class="tax-tabs">
  <a class="tax-tab active" href="#" data-view="income"      onclick="switchView('income');return false;">Income Summary</a>
  <a class="tax-tab"        href="#" data-view="deductions"  onclick="switchView('deductions');return false;">Deductions</a>
  <a class="tax-tab"        href="#" data-view="computation" onclick="switchView('computation');return false;">Tax Computation</a>
  <a class="tax-tab"        href="#" data-view="checklist"   onclick="switchView('checklist');return false;">Documents &amp; Alerts</a>
  <div class="ms-auto d-flex align-items-center gap-2 py-1">
    <label style="font-size:11px;color:#64748b;font-weight:600;text-transform:uppercase;letter-spacing:.4px;margin:0;">FY</label>
    <select id="taxFySelect" class="form-select form-select-sm w-auto"
            onchange="switchView(document.querySelector('.tax-tab.active')?.dataset.view||'income')">
      <option value="FY26">FY 2025–26 (AY 2026–27)</option>
    </select>
  </div>
</div>

<div class="content-area">
  <div id="taxViewIncome"></div>
  <div id="taxViewDeductions"  class="d-none"></div>
  <div id="taxViewComputation" class="d-none"></div>
  <div id="taxViewChecklist"   class="d-none"></div>
</div>

<!-- Add Income Modal -->
<div class="modal fade" id="addIncomeModal" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header py-2" style="background:#1e3a5f;color:#fff;">
        <h6 class="modal-title mb-0">Add Income Source</h6>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div class="row g-2">
          <div class="col-md-4">
            <label class="form-label small fw-semibold">Head</label>
            <select id="addHead" class="form-select form-select-sm">
              <option>Salaries</option>
              <option>Other Sources</option>
              <option>Capital Gains</option>
              <option>House Property</option>
            </select>
          </div>
          <div class="col-md-8">
            <label class="form-label small fw-semibold">Source / Description</label>
            <input id="addSource" type="text" class="form-control form-control-sm" placeholder="e.g. ICICI Savings Interest">
          </div>
          <div class="col-md-4">
            <label class="form-label small fw-semibold">Gross Amount (₹) <span class="text-muted">(leave blank if unknown)</span></label>
            <input id="addGross" type="number" class="form-control form-control-sm" placeholder="e.g. 50000">
          </div>
          <div class="col-md-4">
            <label class="form-label small fw-semibold">TDS (₹) <span class="text-muted">(leave blank if none)</span></label>
            <input id="addTds" type="number" class="form-control form-control-sm" placeholder="e.g. 5000">
          </div>
          <div class="col-md-12">
            <label class="form-label small fw-semibold">Notes</label>
            <input id="addNote" type="text" class="form-control form-control-sm" placeholder="Optional notes">
          </div>
        </div>
      </div>
      <div class="modal-footer py-2">
        <button class="btn btn-sm btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button class="btn btn-sm text-white" style="background:#1e3a5f;" onclick="saveNewIncome()">Add Entry</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>

// ── State — income stored in localStorage, rest from defaults ─────────────────
function loadIncome(fy) {
  const stored = localStorage.getItem('tax_income_' + fy);
  return stored ? JSON.parse(stored) : TAX_DEFAULTS[fy].income.map((x,i)=>({...x, _id:i}));
}
function saveIncome(fy, income) {
  localStorage.setItem('tax_income_' + fy, JSON.stringify(income));
}
function getD(fy) {
  const base = TAX_DEFAULTS[fy];
  return base ? {...base, income: loadIncome(fy)} : null;
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function inr(n) {
  if (n===null||n===undefined) return '<span class="text-muted fst-italic small">pending</span>';
  const L = n/100000;
  if (L>=100) return '₹'+(L/100).toFixed(2)+' Cr';
  if (L>=1)   return '₹'+L.toFixed(2)+'L';
  return '₹'+n.toLocaleString('en-IN');
}

// ── View switcher ─────────────────────────────────────────────────────────────
function switchView(view) {
  document.querySelectorAll('.tax-tab').forEach(l => l.classList.remove('active'));
  document.querySelector('.tax-tab[data-view="'+view+'"]')?.classList.add('active');
  ['income','deductions','computation','checklist'].forEach(v =>
    document.getElementById('taxView'+v.charAt(0).toUpperCase()+v.slice(1)).classList.toggle('d-none', v!==view));
  const fy = document.getElementById('taxFySelect').value;
  if (view==='income')      renderIncome(fy);
  if (view==='deductions')  renderDeductions(fy);
  if (view==='computation') renderComputation(fy);
  if (view==='checklist')   renderChecklist(fy);
}

// ── Delete / Add income ───────────────────────────────────────────────────────
function deleteIncome(fy, id) {
  const income = loadIncome(fy).filter(x => x._id !== id);
  saveIncome(fy, income);
  renderIncome(fy);
}

let _addModal;
function openAddIncome() {
  document.getElementById('addSource').value = '';
  document.getElementById('addGross').value  = '';
  document.getElementById('addTds').value    = '';
  document.getElementById('addNote').value   = '';
  _addModal = _addModal || new bootstrap.Modal(document.getElementById('addIncomeModal'));
  _addModal.show();
}

async function importFromLedger() {
  const fy  = document.getElementById('taxFySelect').value;
  const btn = document.getElementById('ledgerImportBtn');
  btn.disabled = true; btn.innerHTML = '<i class="bi bi-hourglass-split me-1"></i>Loading…';
  try {
    const res  = await fetch('/api/tax/ledger-income/' + fy);
    const data = await res.json();
    if (data.error) throw new Error(data.error);

    const income  = loadIncome(fy);
    const maxId   = income.reduce((m,x)=>Math.max(m,x._id||0), 0);
    let added = 0, skipped = 0, counter = maxId;

    data.credits.forEach(group => {
      const h = group.heading;
      const amt = Math.round(group.total);
      if (amt < 100) return;

      // Map ledger heading to tax head
      let head = 'Other Sources';
      if (h === 'Dividends' || h === 'GCPL Dividends') head = 'Other Sources';
      if (h === 'Investment') { skipped++; return; }  // not income

      // Avoid duplicate if same heading+amount already exists (rough check)
      const alreadyExists = income.some(x =>
        x.note && x.note.includes('ledger') && x.note.includes(h)
      );
      if (alreadyExists) { skipped++; return; }

      counter++;
      income.push({
        head, _id: counter,
        source: h || 'Ledger credit',
        gross: amt,
        tds: null,
        note: `Estimated from expense ledger (${data.ledger_year} credits). Verify against AIS.`,
      });
      added++;
    });

    saveIncome(fy, income);
    renderIncome(fy);
    btn.innerHTML = `<i class="bi bi-check-lg me-1"></i>${added} added${skipped?' ('+skipped+' skipped)':''}`;
    setTimeout(()=>{ btn.disabled=false; btn.innerHTML='<i class="bi bi-database-up me-1"></i>Import from Ledger'; }, 3000);
  } catch(e) {
    btn.disabled = false;
    btn.innerHTML = '<i class="bi bi-database-up me-1"></i>Import from Ledger';
    alert('Error: ' + e.message);
  }
}

function saveNewIncome() {
  const fy     = document.getElementById('taxFySelect').value;
  const head   = document.getElementById('addHead').value;
  const source = document.getElementById('addSource').value.trim();
  const gross  = document.getElementById('addGross').value;
  const tds    = document.getElementById('addTds').value;
  const note   = document.getElementById('addNote').value.trim();
  if (!source) { alert('Source is required.'); return; }
  const income = loadIncome(fy);
  const maxId  = income.reduce((m,x)=>Math.max(m,x._id||0), 0);
  income.push({
    head, source,
    gross: gross !== '' ? parseFloat(gross) : null,
    tds:   tds   !== '' ? parseFloat(tds)   : null,
    note,
    _id: maxId + 1,
  });
  saveIncome(fy, income);
  _addModal.hide();
  renderIncome(fy);
}

// ── INCOME SUMMARY ────────────────────────────────────────────────────────────
function renderIncome(fy) {
  const d = getD(fy); if (!d) return;
  const el = document.getElementById('taxViewIncome');

  const heads      = [...new Set(d.income.map(i=>i.head))];
  const salaryDedn = d.deductions.filter(x=>x.section==='16(ia)'||x.section==='80CCD(2)').reduce((s,x)=>s+(x.amount||0),0);
  const salaryGross= d.income.filter(i=>i.head==='Salaries').reduce((s,i)=>s+(i.gross||0),0);
  const salaryNet  = salaryGross - salaryDedn;
  const knownGross = d.income.filter(i=>i.gross!==null).reduce((s,i)=>s+(i.gross||0),0);
  const pendingCount=d.income.filter(i=>i.gross===null).length;
  const tdsTotal   = d.tds_paid.reduce((s,t)=>s+t.amount,0);
  const roughTax   = Math.round((knownGross - salaryDedn) * d.slab_rate * (1+d.surcharge_rate) * (1+d.cess_rate));
  const roughBal   = roughTax - tdsTotal;

  let rows = '';
  heads.forEach(head => {
    const items    = d.income.filter(i=>i.head===head);
    const headGross= items.reduce((s,i)=>s+(i.gross||0),0);
    const headTDS  = items.reduce((s,i)=>s+(i.tds||0),0);
    rows += `<tr style="background:#1e3a5f;color:#fff;">
      <td class="ps-2 fw-semibold" colspan="4">${head}</td>
      <td class="text-end pe-2 fw-semibold">${inr(headGross||null)}</td>
      <td class="text-end pe-2 fw-semibold">${headTDS?inr(headTDS):''}</td>
      <td></td>
    </tr>`;
    items.forEach(item => {
      const docLink = item.doc ? `<a href="/data/${item.doc}" target="_blank" style="color:#1e3a5f;text-decoration:none;"><i class="bi bi-file-earmark-text"></i></a>` : '';
      rows += `<tr>
        <td class="ps-3" style="font-size:12px;">${item.source}</td>
        <td style="font-size:11px;color:#6b7280;max-width:220px;">${item.note||''}</td>
        <td class="text-center" style="font-size:11px;">${docLink}</td>
        <td class="text-end pe-2" style="font-size:12px;">${inr(item.gross)}</td>
        <td class="text-end pe-2" style="font-size:12px;color:#6b7280;">${item.tds!=null?inr(item.tds):''}</td>
        <td class="text-center"><button class="del-btn" onclick="deleteIncome('${fy}',${item._id})" title="Remove"><i class="bi bi-x-lg"></i></button></td>
      </tr>`;
    });
    if (head==='Salaries') {
      rows += `<tr style="background:#e8f0fe;">
        <td class="ps-3 fw-semibold" style="font-size:12px;" colspan="3">Less: Std. Deduction + Employer NPS (80CCD2)</td>
        <td class="text-end pe-2 fw-semibold text-success" style="font-size:12px;">(${inr(salaryDedn)})</td>
        <td></td><td></td>
      </tr>
      <tr style="background:#dbeafe;">
        <td class="ps-2 fw-semibold" style="font-size:12px;" colspan="3">Net Taxable — Salaries</td>
        <td class="text-end pe-2 fw-semibold" style="font-size:12px;">${inr(salaryNet)}</td>
        <td></td><td></td>
      </tr>`;
    }
  });

  el.innerHTML = `
  <div class="row g-3 mb-4">
    <div class="col-6 col-md-3">
      <div style="background:#f0f4ff;border-radius:10px;padding:14px 16px;">
        <div style="font-size:10px;color:#6b7280;font-weight:600;text-transform:uppercase;">Total Gross Income</div>
        <div style="font-size:1.1rem;font-weight:700;color:#1e3a5f;margin-top:4px;">${inr(knownGross)}</div>
        <div style="font-size:10px;color:#9ca3af;">${pendingCount} sources pending</div>
      </div>
    </div>
    <div class="col-6 col-md-3">
      <div style="background:#f0faf4;border-radius:10px;padding:14px 16px;">
        <div style="font-size:10px;color:#6b7280;font-weight:600;text-transform:uppercase;">TDS Deducted</div>
        <div style="font-size:1.1rem;font-weight:700;color:#166534;margin-top:4px;">${inr(tdsTotal)}</div>
        <div style="font-size:10px;color:#9ca3af;">salary + dividends + SGB</div>
      </div>
    </div>
    <div class="col-6 col-md-3">
      <div style="background:#fffbeb;border-radius:10px;padding:14px 16px;">
        <div style="font-size:10px;color:#6b7280;font-weight:600;text-transform:uppercase;">Est. Tax Liability</div>
        <div style="font-size:1.1rem;font-weight:700;color:#92400e;margin-top:4px;">${inr(roughTax)}</div>
        <div style="font-size:10px;color:#9ca3af;">30% + 25% surcharge + 4% cess</div>
      </div>
    </div>
    <div class="col-6 col-md-3">
      <div style="background:${roughBal>0?'#fff1f2':'#f0faf4'};border-radius:10px;padding:14px 16px;">
        <div style="font-size:10px;color:#6b7280;font-weight:600;text-transform:uppercase;">${roughBal>0?'Est. Balance Payable':'Est. Refund'}</div>
        <div style="font-size:1.1rem;font-weight:700;color:${roughBal>0?'#991b1b':'#166534'};margin-top:4px;">${inr(Math.abs(roughBal))}</div>
        <div style="font-size:10px;color:#9ca3af;">before ITR deductions</div>
      </div>
    </div>
  </div>
  <div style="border:1px solid #e5e7eb;border-radius:10px;overflow:hidden;">
    <div style="background:#1e3a5f;color:#fff;padding:10px 16px;font-size:13px;font-weight:600;display:flex;align-items:center;justify-content:space-between;">
      <span>Consolidated Income — FY 2025–26 (AY 2026–27)</span>
      <div class="d-flex gap-2">
        <button id="ledgerImportBtn" class="btn btn-sm" style="font-size:11px;background:#2d4a7a;color:#fff;" onclick="importFromLedger()"><i class="bi bi-database-up me-1"></i>Import from Ledger</button>
        <button class="btn btn-sm btn-light" style="font-size:11px;" onclick="openAddIncome()"><i class="bi bi-plus-lg me-1"></i>Add Entry</button>
      </div>
    </div>
    <div style="overflow-x:auto;">
    <table class="table table-sm table-hover mb-0" style="font-size:12.5px;min-width:620px;">
      <thead class="table-light">
        <tr>
          <th class="ps-3" style="width:200px;">Source</th>
          <th style="width:240px;">Notes</th>
          <th style="width:36px;" class="text-center">Doc</th>
          <th class="text-end pe-2">Gross Amount</th>
          <th class="text-end pe-2">TDS</th>
          <th style="width:36px;"></th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
      <tfoot>
        <tr style="background:#0f172a;color:#fff;">
          <td class="ps-2 fw-bold" colspan="3">TOTAL (confirmed sources)</td>
          <td class="text-end pe-2 fw-bold">${inr(knownGross)}</td>
          <td class="text-end pe-2 fw-bold">${inr(tdsTotal)}</td>
          <td></td>
        </tr>
      </tfoot>
    </table>
    </div>
  </div>
  <div class="mt-2 text-muted" style="font-size:11px;"><i class="bi bi-info-circle me-1"></i>Est. tax uses flat 39% effective rate (30% + 25% surcharge + 4% cess). Actual liability depends on deductions, capital gains classification, and house property computation.</div>`;
}

// ── DEDUCTIONS ────────────────────────────────────────────────────────────────
function renderDeductions(fy) {
  const d = getD(fy); if (!d) return;
  const el = document.getElementById('taxViewDeductions');
  const isNew = d.regime === 'New Regime';
  const applicable = d.deductions.filter(x => !isNew || x.new_regime);
  const notApplicable = d.deductions.filter(x => isNew && !x.new_regime);
  const totalAllowed = applicable.filter(x=>x.confirmed&&x.amount).reduce((s,x)=>s+(x.amount||0),0);

  const makeRows = (list) => list.map(x=>`
  <tr style="${isNew&&!x.new_regime?'opacity:0.45;':''}">
    <td class="ps-3 fw-semibold" style="font-size:12px;width:100px;">${x.section}</td>
    <td style="font-size:12px;">${x.label}</td>
    <td style="font-size:11px;color:#6b7280;">${x.note||''}</td>
    <td class="text-end pe-2" style="font-size:12px;">${inr(x.amount)}</td>
    <td class="text-center" style="font-size:11px;">

// ── TAX COMPUTATION ───────────────────────────────────────────────────────────
function renderComputation(fy) {
  const d = getD(fy); if (!d) return;
  const el = document.getElementById('taxViewComputation');
  const isNew = d.regime === 'New Regime';

  // Under new regime only 16(ia) and 80CCD(2) are allowed
  const allowedDedns = d.deductions.filter(x => isNew ? x.new_regime : (x.confirmed && x.amount));

  const salaryGross  = d.income.filter(i=>i.head==='Salaries').reduce((s,i)=>s+(i.gross||0),0);
  const otherGross   = d.income.filter(i=>i.head==='Other Sources'&&i.gross).reduce((s,i)=>s+(i.gross||0),0);
  const cgGross      = d.income.filter(i=>i.head==='Capital Gains'&&i.gross).reduce((s,i)=>s+(i.gross||0),0);
  const salaryDedn   = allowedDedns.filter(x=>x.section==='16(ia)'||x.section==='80CCD(2)').reduce((s,x)=>s+(x.amount||0),0);
  const otherDedns   = allowedDedns.filter(x=>x.section!=='16(ia)'&&x.section!=='80CCD(2)'&&x.amount).reduce((s,x)=>s+(x.amount||0),0);
  const netSalary    = salaryGross - salaryDedn;
  // Capital gains taxed separately at special rates; regular income taxed at slab
  const regularIncome= netSalary + otherGross - otherDedns;
  const totalTaxable = regularIncome + cgGross;

  // Slab tax on regular income (new regime slabs, income clearly >₹15L so 30% on most)
  // For simplicity at this income level: effectively 30% on everything above ₹15L
  function slabTax(income) {
    if (income <= 300000)  return 0;
    if (income <= 700000)  return (income-300000)*0.05;
    if (income <= 1000000) return 20000+(income-700000)*0.10;
    if (income <= 1200000) return 50000+(income-1000000)*0.15;
    if (income <= 1500000) return 80000+(income-1200000)*0.20;
    return 140000+(income-1500000)*0.30;
  }
  const baseTaxIncome = slabTax(regularIncome);
  // Capital gains: assume all STCG for now (20%) — conservative
  const cgTax        = cgGross * 0.20;
  const totalBase    = baseTaxIncome + cgTax;
  const surcharge    = totalBase * 0.25;  // >₹5Cr income
  const cess         = (totalBase + surcharge) * 0.04;
  const totalTax     = totalBase + surcharge + cess;
  const tdsTotal     = d.tds_paid.reduce((s,t)=>s+t.amount,0);
  const balance      = totalTax - tdsTotal;

  el.innerHTML = `
  <div style="max-width:620px;">
  <div class="alert alert-info py-2 px-3 mb-3" style="font-size:12px;">
    <i class="bi bi-info-circle me-1"></i><strong>New Regime.</strong> Only Standard Deduction + Employer NPS apply. Capital gains taxed at special rates (assumed STCG @20% — update when STCG/LTCG split is confirmed).
  </div>
  <div style="border:1px solid #e5e7eb;border-radius:10px;overflow:hidden;">
    <div style="background:#1e3a5f;color:#fff;padding:10px 16px;font-size:13px;font-weight:600;">Tax Computation — FY 2025–26 (New Regime)</div>
    <table class="table table-sm mb-0" style="font-size:12.5px;">
    <tbody>
      <tr class="table-light"><td colspan="2" class="ps-3 fw-semibold py-2">Salary Income</td></tr>
      <tr><td class="ps-4">Salaries (gross)</td><td class="text-end pe-3">${inr(salaryGross)}</td></tr>
      <tr><td class="ps-4 text-muted">Less: Standard Deduction</td><td class="text-end pe-3 text-success">(${inr(75000)})</td></tr>
      <tr><td class="ps-4 text-muted">Less: Employer NPS 80CCD(2)</td><td class="text-end pe-3 text-success">(${inr(2561004)})</td></tr>
      <tr style="background:#e8f0fe;"><td class="ps-4 fw-semibold">Net Salary</td><td class="text-end pe-3 fw-semibold">${inr(netSalary)}</td></tr>
      <tr class="table-light"><td colspan="2" class="ps-3 fw-semibold py-2">Other Income (taxed at slab)</td></tr>
      <tr><td class="ps-4">Dividends + Interest</td><td class="text-end pe-3">${inr(otherGross)}</td></tr>
      <tr style="background:#e8f0fe;"><td class="ps-4 fw-semibold">Regular Taxable Income</td><td class="text-end pe-3 fw-semibold">${inr(regularIncome)}</td></tr>
      <tr class="table-light"><td colspan="2" class="ps-3 fw-semibold py-2">Capital Gains (special rates)</td></tr>
      <tr><td class="ps-4">ESOP Sales (est. — STCG assumed @20%)</td><td class="text-end pe-3">${inr(cgGross)}</td></tr>
      <tr style="background:#1e3a5f;color:#fff;"><td class="ps-3 fw-bold">Total Taxable (regular + CG)</td><td class="text-end pe-3 fw-bold">${inr(totalTaxable)}</td></tr>
      <tr class="table-light"><td colspan="2" class="ps-3 fw-semibold py-2">Tax Calculation</td></tr>
      <tr><td class="ps-4 text-muted">Slab tax on regular income</td><td class="text-end pe-3">${inr(baseTaxIncome)}</td></tr>
      <tr><td class="ps-4 text-muted">CG tax (STCG @20%)</td><td class="text-end pe-3">${inr(cgTax)}</td></tr>
      <tr><td class="ps-4 text-muted">Surcharge @25% (total income &gt;₹5Cr)</td><td class="text-end pe-3">${inr(surcharge)}</td></tr>
      <tr><td class="ps-4 text-muted">Health &amp; Education Cess @4%</td><td class="text-end pe-3">${inr(cess)}</td></tr>
      <tr style="background:#374151;color:#fff;"><td class="ps-3 fw-semibold">Gross Tax Payable</td><td class="text-end pe-3 fw-semibold">${inr(totalTax)}</td></tr>
      <tr class="table-light"><td colspan="2" class="ps-3 fw-semibold py-2">TDS Already Paid</td></tr>
      ${d.tds_paid.map(t=>`
      <tr><td class="ps-4 text-muted">${t.source}</td><td class="text-end pe-3 text-success">(${inr(t.amount)})</td></tr>`).join('')}
      <tr style="background:${balance>0?'#fef2f2':'#f0faf4'};"><td class="ps-3 fw-bold">${balance>0?'Balance Tax Payable':'Estimated Refund'}</td>
        <td class="text-end pe-3 fw-bold" style="color:${balance>0?'#991b1b':'#166534'};">${inr(Math.abs(balance))}</td></tr>
    </tbody>
    </table>
  </div>
  <div class="alert alert-warning mt-3 py-2 px-3" style="font-size:11.5px;">
    <i class="bi bi-exclamation-triangle me-1"></i>Key unknowns: STCG vs LTCG split on ESOP sales (LTCG @12.5% vs STCG @20%); StanChart foreign income (Schedule FA); bank savings interest (pending AIS). Surcharge applies as total income exceeds ₹5Cr.
  </div>
  </div>`;
}
