<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Tax Management</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
<style>
body { background:#f8f9fa; font-size:14px; }
.topbar { background:#1e293b; color:#f1f5f9; padding:10px 20px; display:flex; align-items:center; gap:16px; }
.topbar a { color:#94a3b8; text-decoration:none; font-size:12px; }
.topbar a:hover { color:#f1f5f9; }
.topbar-title { font-size:15px; font-weight:600; color:#f1f5f9; }
.tax-tabs { display:flex; background:#fff; border-bottom:1px solid #e2e8f0; padding:0 20px; gap:4px; align-items:center; }
.tax-tab { padding:11px 18px; font-size:13px; font-weight:500; color:#64748b; border-bottom:2px solid transparent; cursor:pointer; white-space:nowrap; text-decoration:none; display:inline-block; }
.tax-tab:hover { color:#1e3a5f; }
.tax-tab.active { color:#1e3a5f; border-bottom-color:#1e3a5f; }
.content-area { padding:24px 20px; max-width:1100px; margin:0 auto; }
.del-btn { background:none; border:none; color:#dc2626; cursor:pointer; padding:0 6px; font-size:13px; opacity:0.5; }
.del-btn:hover { opacity:1; }
</style>
</head>
<body>

<div class="topbar">
  <a href="/home"><i class="bi bi-house me-1"></i>Home</a>
  <span style="color:#475569;">›</span>
  <span class="topbar-title"><i class="bi bi-receipt-cutoff me-2"></i>Tax Management</span>
  <span style="margin-left:auto;font-size:11px;color:#64748b;">{{ user }}</span>
</div>

<div class="tax-tabs">
  <a class="tax-tab active" href="#" data-view="income"      onclick="switchView('income');return false;">Income Summary</a>
  <a class="tax-tab"        href="#" data-view="deductions"  onclick="switchView('deductions');return false;">Deductions</a>
  <a class="tax-tab"        href="#" data-view="computation" onclick="switchView('computation');return false;">Tax Computation</a>
  <a class="tax-tab"        href="#" data-view="esop"        onclick="switchView('esop');return false;">ESOP Holdings</a>
  <a class="tax-tab"        href="#" data-view="checklist"   onclick="switchView('checklist');return false;">Documents &amp; Alerts</a>
  <div class="ms-auto d-flex align-items-center gap-2 py-1">
    <label style="font-size:11px;color:#64748b;font-weight:600;text-transform:uppercase;letter-spacing:.4px;margin:0;">FY</label>
    <select id="taxFySelect" class="form-select form-select-sm w-auto"
            onchange="switchView(document.querySelector('.tax-tab.active')?.dataset.view||'income')">
      <option value="FY26">FY 2025–26 (AY 2026–27)</option>
    </select>
  </div>
</div>

<div class="content-area">
  <div id="taxViewIncome"></div>
  <div id="taxViewDeductions"  class="d-none"></div>
  <div id="taxViewComputation" class="d-none"></div>
  <div id="taxViewEsop"        class="d-none"></div>
  <div id="taxViewChecklist"   class="d-none"></div>
</div>

<!-- Add Income Modal -->
<div class="modal fade" id="addIncomeModal" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header py-2" style="background:#1e3a5f;color:#fff;">
        <h6 class="modal-title mb-0">Add Income Source</h6>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div class="row g-2">
          <div class="col-md-4">
            <label class="form-label small fw-semibold">Head</label>
            <select id="addHead" class="form-select form-select-sm">
              <option>Salaries</option>
              <option>Other Sources</option>
              <option>Capital Gains</option>
              <option>House Property</option>
            </select>
          </div>
          <div class="col-md-8">
            <label class="form-label small fw-semibold">Source / Description</label>
            <input id="addSource" type="text" class="form-control form-control-sm" placeholder="e.g. ICICI Savings Interest">
          </div>
          <div class="col-md-4">
            <label class="form-label small fw-semibold">Gross Amount (₹) <span class="text-muted">(leave blank if unknown)</span></label>
            <input id="addGross" type="number" class="form-control form-control-sm" placeholder="e.g. 50000">
          </div>
          <div class="col-md-4">
            <label class="form-label small fw-semibold">TDS (₹) <span class="text-muted">(leave blank if none)</span></label>
            <input id="addTds" type="number" class="form-control form-control-sm" placeholder="e.g. 5000">
          </div>
          <div class="col-md-12">
            <label class="form-label small fw-semibold">Notes</label>
            <input id="addNote" type="text" class="form-control form-control-sm" placeholder="Optional notes">
          </div>
        </div>
      </div>
      <div class="modal-footer py-2">
        <button class="btn btn-sm btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button class="btn btn-sm text-white" style="background:#1e3a5f;" onclick="saveNewIncome()">Add Entry</button>
      </div>
    </div>
  </div>
</div>

// ── State — income stored in localStorage, rest from defaults ─────────────────
function loadIncome(fy) {
  const stored = localStorage.getItem('tax_income_' + fy);
  return stored ? JSON.parse(stored) : TAX_DEFAULTS[fy].income.map((x,i)=>({...x, _id:i}));
}
function saveIncome(fy, income) {
  localStorage.setItem('tax_income_' + fy, JSON.stringify(income));
}
function getD(fy) {
  const base = TAX_DEFAULTS[fy];
  return base ? {...base, income: loadIncome(fy)} : null;
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function inr(n) {
  if (n===null||n===undefined) return '<span class="text-muted fst-italic small">pending</span>';
  const L = n/100000;
  if (L>=100) return '₹'+(L/100).toFixed(2)+' Cr';
  if (L>=1)   return '₹'+L.toFixed(2)+'L';
  return '₹'+n.toLocaleString('en-IN');
}

// ── View switcher ─────────────────────────────────────────────────────────────
function switchView(view) {
  document.querySelectorAll('.tax-tab').forEach(l => l.classList.remove('active'));
  document.querySelector('.tax-tab[data-view="'+view+'"]')?.classList.add('active');
  ['income','deductions','computation','esop','checklist'].forEach(v =>
    document.getElementById('taxView'+v.charAt(0).toUpperCase()+v.slice(1)).classList.toggle('d-none', v!==view));
  const fy = document.getElementById('taxFySelect').value;
  if (view==='income')      renderIncome(fy);
  if (view==='deductions')  renderDeductions(fy);
  if (view==='computation') renderComputation(fy);
  if (view==='esop')        renderEsop();
  if (view==='checklist')   renderChecklist(fy);
}

// ── Delete / Add income ───────────────────────────────────────────────────────
function deleteIncome(fy, id) {
  const income = loadIncome(fy).filter(x => x._id !== id);
  saveIncome(fy, income);
  renderIncome(fy);
}

let _addModal;
function openAddIncome() {
  document.getElementById('addSource').value = '';
  document.getElementById('addGross').value  = '';
  document.getElementById('addTds').value    = '';
  document.getElementById('addNote').value   = '';
  _addModal = _addModal || new bootstrap.Modal(document.getElementById('addIncomeModal'));
  _addModal.show();
}

async function importFromLedger() {
  const fy  = document.getElementById('taxFySelect').value;
  const btn = document.getElementById('ledgerImportBtn');
  btn.disabled = true; btn.innerHTML = '<i class="bi bi-hourglass-split me-1"></i>Loading…';
  try {
    const res  = await fetch('/api/tax/ledger-income/' + fy);
    const data = await res.json();
    if (data.error) throw new Error(data.error);

    const income  = loadIncome(fy);
    const maxId   = income.reduce((m,x)=>Math.max(m,x._id||0), 0);
    let added = 0, skipped = 0, counter = maxId;

    data.credits.forEach(group => {
      const h = group.heading;
      const amt = Math.round(group.total);
      if (amt < 100) return;

      // Map ledger heading to tax head
      let head = 'Other Sources';
      if (h === 'Dividends' || h === 'GCPL Dividends') head = 'Other Sources';
      if (h === 'Investment') { skipped++; return; }  // not income

      // Avoid duplicate if same heading+amount already exists (rough check)
      const alreadyExists = income.some(x =>
        x.note && x.note.includes('ledger') && x.note.includes(h)
      );
      if (alreadyExists) { skipped++; return; }

      counter++;
      income.push({
        head, _id: counter,
        source: h || 'Ledger credit',
        gross: amt,
        tds: null,
        note: `Estimated from expense ledger (${data.ledger_year} credits). Verify against AIS.`,
      });
      added++;
    });

    saveIncome(fy, income);
    renderIncome(fy);
    btn.innerHTML = `<i class="bi bi-check-lg me-1"></i>${added} added${skipped?' ('+skipped+' skipped)':''}`;
    setTimeout(()=>{ btn.disabled=false; btn.innerHTML='<i class="bi bi-database-up me-1"></i>Import from Ledger'; }, 3000);
  } catch(e) {
    btn.disabled = false;
    btn.innerHTML = '<i class="bi bi-database-up me-1"></i>Import from Ledger';
    alert('Error: ' + e.message);
  }
}

function saveNewIncome() {
  const fy     = document.getElementById('taxFySelect').value;
  const head   = document.getElementById('addHead').value;
  const source = document.getElementById('addSource').value.trim();
  const gross  = document.getElementById('addGross').value;
  const tds    = document.getElementById('addTds').value;
  const note   = document.getElementById('addNote').value.trim();
  if (!source) { alert('Source is required.'); return; }
  const income = loadIncome(fy);
  const maxId  = income.reduce((m,x)=>Math.max(m,x._id||0), 0);
  income.push({
    head, source,
    gross: gross !== '' ? parseFloat(gross) : null,
    tds:   tds   !== '' ? parseFloat(tds)   : null,
    note,
    _id: maxId + 1,
  });
  saveIncome(fy, income);
  _addModal.hide();
  renderIncome(fy);
}

// ── INCOME SUMMARY ────────────────────────────────────────────────────────────
function renderIncome(fy) {
  const d = getD(fy); if (!d) return;
  const el = document.getElementById('taxViewIncome');

  const heads      = [...new Set(d.income.map(i=>i.head))];
  const salaryDedn = d.deductions.filter(x=>x.section==='16(ia)'||x.section==='80CCD(2)').reduce((s,x)=>s+(x.amount||0),0);
  const salaryGross= d.income.filter(i=>i.head==='Salaries').reduce((s,i)=>s+(i.gross||0),0);
  const salaryNet  = salaryGross - salaryDedn;
  const knownGross = d.income.filter(i=>i.gross!==null).reduce((s,i)=>s+(i.gross||0),0);
  const pendingCount=d.income.filter(i=>i.gross===null).length;
  const tdsTotal   = d.tds_paid.reduce((s,t)=>s+t.amount,0);
  const roughTax   = Math.round((knownGross - salaryDedn) * d.slab_rate * (1+d.surcharge_rate) * (1+d.cess_rate));
  const roughBal   = roughTax - tdsTotal;

  let rows = '';
  heads.forEach(head => {
    const items    = d.income.filter(i=>i.head===head);
    const headGross= items.reduce((s,i)=>s+(i.gross||0),0);
    const headTDS  = items.reduce((s,i)=>s+(i.tds||0),0);
    rows += `<tr style="background:#1e3a5f;color:#fff;">
      <td class="ps-2 fw-semibold" colspan="4">${head}</td>
      <td class="text-end pe-2 fw-semibold">${inr(headGross||null)}</td>
      <td class="text-end pe-2 fw-semibold">${headTDS?inr(headTDS):''}</td>
      <td></td>
    </tr>`;
    items.forEach(item => {
      const docLink = item.doc ? `<a href="/data/${item.doc}" target="_blank" style="color:#1e3a5f;text-decoration:none;"><i class="bi bi-file-earmark-text"></i></a>` : '';
      const aisTag = item.ais === true
        ? `<span style="font-size:9px;background:#dcfce7;color:#166534;border:1px solid #86efac;border-radius:3px;padding:1px 5px;margin-left:5px;font-weight:600;">AIS ✓</span>`
        : item.ais === false
          ? `<span style="font-size:9px;background:#fef9c3;color:#92400e;border:1px solid #fde047;border-radius:3px;padding:1px 5px;margin-left:5px;font-weight:600;">Est.</span>`
          : '';
      const rowBg = item.note && item.note.includes('DISCREPANCY') ? 'background:#fff7ed;' : '';
      rows += `<tr style="${rowBg}">
        <td class="ps-3" style="font-size:12px;">${item.source}${aisTag}</td>
        <td style="font-size:11px;color:#6b7280;max-width:220px;">${item.note||''}</td>
        <td class="text-center" style="font-size:11px;">${docLink}</td>
        <td class="text-end pe-2" style="font-size:12px;">${inr(item.gross)}</td>
        <td class="text-end pe-2" style="font-size:12px;color:#6b7280;">${item.tds!=null?inr(item.tds):''}</td>
        <td class="text-center"><button class="del-btn" onclick="deleteIncome('${fy}',${item._id})" title="Remove"><i class="bi bi-x-lg"></i></button></td>
      </tr>`;
    });
    if (head==='Salaries') {
      rows += `<tr style="background:#e8f0fe;">
        <td class="ps-3 fw-semibold" style="font-size:12px;" colspan="3">Less: Std. Deduction + Employer NPS (80CCD2)</td>
        <td class="text-end pe-2 fw-semibold text-success" style="font-size:12px;">(${inr(salaryDedn)})</td>
        <td></td><td></td>
      </tr>
      <tr style="background:#dbeafe;">
        <td class="ps-2 fw-semibold" style="font-size:12px;" colspan="3">Net Taxable — Salaries</td>
        <td class="text-end pe-2 fw-semibold" style="font-size:12px;">${inr(salaryNet)}</td>
        <td></td><td></td>
      </tr>`;
    }

// ── TAX COMPUTATION ───────────────────────────────────────────────────────────
function renderComputation(fy) {
  const d = getD(fy); if (!d) return;
  const el = document.getElementById('taxViewComputation');
  const isNew = d.regime === 'New Regime';

  // Under new regime only 16(ia) and 80CCD(2) are allowed
  const allowedDedns = d.deductions.filter(x => isNew ? x.new_regime : (x.confirmed && x.amount));

  const salaryGross  = d.income.filter(i=>i.head==='Salaries').reduce((s,i)=>s+(i.gross||0),0);
  const otherGross   = d.income.filter(i=>i.head==='Other Sources'&&i.gross).reduce((s,i)=>s+(i.gross||0),0);
  // GCPL ESOP LTCG is identified; other CG entries (Solidarity, Latent, StanChart) are pending
  const ltcgGross    = d.income.filter(i=>i.head==='Capital Gains'&&i.source.includes('LTCG')&&i.gross).reduce((s,i)=>s+(i.gross||0),0);
  const stcgGross    = d.income.filter(i=>i.head==='Capital Gains'&&!i.source.includes('LTCG')&&i.gross).reduce((s,i)=>s+(i.gross||0),0);
  const cgGross      = ltcgGross + stcgGross;
  const salaryDedn   = allowedDedns.filter(x=>x.section==='16(ia)'||x.section==='80CCD(2)').reduce((s,x)=>s+(x.amount||0),0);
  const otherDedns   = allowedDedns.filter(x=>x.section!=='16(ia)'&&x.section!=='80CCD(2)'&&x.amount).reduce((s,x)=>s+(x.amount||0),0);
  const netSalary    = salaryGross - salaryDedn;
  const regularIncome= netSalary + otherGross - otherDedns;
  const totalTaxable = regularIncome + cgGross;

  function slabTax(income) {
    if (income <= 300000)  return 0;
    if (income <= 700000)  return (income-300000)*0.05;
    if (income <= 1000000) return 20000+(income-700000)*0.10;
    if (income <= 1200000) return 50000+(income-1000000)*0.15;
    if (income <= 1500000) return 80000+(income-1200000)*0.20;
    return 140000+(income-1500000)*0.30;
  }
  const baseTaxIncome = slabTax(regularIncome);
  const slabSurcharge = baseTaxIncome * 0.25;  // >₹5Cr regular income
  const slabCess      = (baseTaxIncome + slabSurcharge) * 0.04;
  const slabTotal     = baseTaxIncome + slabSurcharge + slabCess;

  // LTCG u/s 112A: 12.5% on gains above ₹1.25L exemption; surcharge CAPPED at 15% for listed equity LTCG
  const ltcgExemption = 125000;
  const ltcgTaxable   = Math.max(0, ltcgGross - ltcgExemption);
  const ltcgBase      = ltcgTaxable * 0.125;
  const ltcgSurcharge = ltcgBase * 0.15;   // 15% cap on LTCG (Sec 112A), NOT 25%
  const ltcgCess      = (ltcgBase + ltcgSurcharge) * 0.04;
  const ltcgTotal     = ltcgBase + ltcgSurcharge + ltcgCess;

  // STCG u/s 111A: 20% flat, 25% surcharge (if any)
  const stcgBase      = stcgGross * 0.20;
  const stcgSurcharge = stcgBase * 0.25;
  const stcgCess      = (stcgBase + stcgSurcharge) * 0.04;
  const stcgTotal     = stcgBase + stcgSurcharge + stcgCess;

  const totalTax     = slabTotal + ltcgTotal + stcgTotal;
  const tdsTotal     = d.tds_paid.reduce((s,t)=>s+t.amount,0);
  const taxesPaid    = (d.taxes_paid||[]).reduce((s,t)=>s+t.amount,0);
  const balance      = totalTax - tdsTotal - taxesPaid;

  el.innerHTML = `
  <div style="max-width:660px;">
  <div class="alert alert-info py-2 px-3 mb-3" style="font-size:12px;">
    <i class="bi bi-info-circle me-1"></i><strong>New Regime.</strong> GCPL ESOP gains confirmed ALL LTCG (taxed @12.5% with 15% surcharge cap u/s 112A). Solidarity/Latent PMS gains pending — will increase liability when added.
  </div>
  <div style="border:1px solid #e5e7eb;border-radius:10px;overflow:hidden;">
    <div style="background:#1e3a5f;color:#fff;padding:10px 16px;font-size:13px;font-weight:600;">Tax Computation — FY 2025–26 (New Regime)</div>
    <table class="table table-sm mb-0" style="font-size:12.5px;">
    <tbody>
      <tr class="table-light"><td colspan="2" class="ps-3 fw-semibold py-2">A. Salary Income</td></tr>
      <tr><td class="ps-4">Salaries — gross (cash + perquisite + NPS)</td><td class="text-end pe-3">${inr(salaryGross)}</td></tr>
      <tr><td class="ps-4 text-muted">Less: Standard Deduction u/s 16(ia)</td><td class="text-end pe-3 text-success">(${inr(75000)})</td></tr>
      <tr><td class="ps-4 text-muted">Less: Employer NPS u/s 80CCD(2)</td><td class="text-end pe-3 text-success">(${inr(2561004)})</td></tr>
      <tr style="background:#e8f0fe;"><td class="ps-4 fw-semibold">Net Salary</td><td class="text-end pe-3 fw-semibold">${inr(netSalary)}</td></tr>

      <tr class="table-light"><td colspan="2" class="ps-3 fw-semibold py-2">B. Other Income (taxed at slab)</td></tr>
      <tr><td class="ps-4">Dividends + Interest (known)</td><td class="text-end pe-3">${inr(otherGross)}</td></tr>
      <tr style="background:#e8f0fe;"><td class="ps-4 fw-semibold">Regular Taxable Income (A+B)</td><td class="text-end pe-3 fw-semibold">${inr(regularIncome)}</td></tr>

      <tr class="table-light"><td colspan="2" class="ps-3 fw-semibold py-2">C. Long-Term Capital Gains (u/s 112A)</td></tr>
      <tr><td class="ps-4">GCPL ESOP LTCG — gross gain</td><td class="text-end pe-3">${inr(ltcgGross)}</td></tr>
      <tr><td class="ps-4 text-muted">Less: Annual exemption</td><td class="text-end pe-3 text-success">(${inr(ltcgExemption)})</td></tr>
      <tr style="background:#e8f0fe;"><td class="ps-4 fw-semibold">Taxable LTCG</td><td class="text-end pe-3 fw-semibold">${inr(ltcgTaxable)}</td></tr>
      ${stcgGross>0?`
      <tr class="table-light"><td colspan="2" class="ps-3 fw-semibold py-2">D. Short-Term Capital Gains (u/s 111A)</td></tr>
      <tr><td class="ps-4">STCG (pending — Solidarity/Latent/other)</td><td class="text-end pe-3">${inr(stcgGross)}</td></tr>`:''}

      <tr style="background:#1e3a5f;color:#fff;"><td class="ps-3 fw-bold">Total Taxable Income</td><td class="text-end pe-3 fw-bold">${inr(totalTaxable)}</td></tr>

      <tr class="table-light"><td colspan="2" class="ps-3 fw-semibold py-2">Tax Calculation</td></tr>
      <tr><td class="ps-4 text-muted">Slab tax on regular income (30% bracket)</td><td class="text-end pe-3">${inr(baseTaxIncome)}</td></tr>
      <tr><td class="ps-4 text-muted">Surcharge @25% on slab tax (income &gt;₹5Cr)</td><td class="text-end pe-3">${inr(slabSurcharge)}</td></tr>
      <tr><td class="ps-4 text-muted">Cess @4% on slab + surcharge</td><td class="text-end pe-3">${inr(slabCess)}</td></tr>
      <tr style="background:#f1f5f9;"><td class="ps-4 fw-semibold">Slab tax total</td><td class="text-end pe-3 fw-semibold">${inr(slabTotal)}</td></tr>
      <tr><td class="ps-4 text-muted">LTCG tax @12.5% on ₹${(ltcgTaxable/100000).toFixed(2)}L</td><td class="text-end pe-3">${inr(ltcgBase)}</td></tr>
      <tr><td class="ps-4 text-muted">Surcharge @15% on LTCG tax (capped u/s 112A)</td><td class="text-end pe-3">${inr(ltcgSurcharge)}</td></tr>
      <tr><td class="ps-4 text-muted">Cess @4% on LTCG tax + surcharge</td><td class="text-end pe-3">${inr(ltcgCess)}</td></tr>
      <tr style="background:#f1f5f9;"><td class="ps-4 fw-semibold">LTCG tax total (eff. ~14.95%)</td><td class="text-end pe-3 fw-semibold">${inr(ltcgTotal)}</td></tr>
      ${stcgGross>0?`<tr style="background:#f1f5f9;"><td class="ps-4 fw-semibold">STCG tax total</td><td class="text-end pe-3 fw-semibold">${inr(stcgTotal)}</td></tr>`:''}
      <tr style="background:#374151;color:#fff;"><td class="ps-3 fw-semibold">Gross Tax Payable</td><td class="text-end pe-3 fw-semibold">${inr(totalTax)}</td></tr>

      <tr class="table-light"><td colspan="2" class="ps-3 fw-semibold py-2">TDS Deducted at Source</td></tr>
      ${d.tds_paid.map(t=>`
      <tr><td class="ps-4 text-muted">${t.source}${t.note?'<br><span style="font-size:10px;color:#9ca3af;">'+t.note+'</span>':''}</td><td class="text-end pe-3 text-success">(${inr(t.amount)})</td></tr>`).join('')}

      <tr class="table-light"><td colspan="2" class="ps-3 fw-semibold py-2">Taxes Paid (Advance Tax / Challans / TCS)</td></tr>
      ${(d.taxes_paid||[]).map(t=>`
      <tr><td class="ps-4 text-muted">${t.source}<br><span style="font-size:10px;color:#9ca3af;">${t.note||''}</span></td>
          <td class="text-end pe-3 ${t.amount<0?'text-danger':'text-success'}">${t.amount<0?inr(Math.abs(t.amount))+'<span class="text-muted ms-1">(credit)</span>':'('+inr(t.amount)+')'}</td></tr>`).join('')}

      <tr style="background:${balance>0?'#fef2f2':'#f0faf4'};border-top:2px solid ${balance>0?'#fca5a5':'#86efac'};">
        <td class="ps-3 fw-bold">${balance>0?'Balance Tax Payable':'Estimated Refund'}</td>
        <td class="text-end pe-3 fw-bold" style="color:${balance>0?'#991b1b':'#166534'};">${inr(Math.abs(balance))}</td>
      </tr>
    </tbody>
    </table>
  </div>
  <div class="alert alert-warning mt-3 py-2 px-3" style="font-size:11.5px;">

}

    {level:"info",    text:"GCPL ESOP LTCG: ₹648.48L confirmed all long-term, tax ₹96.76L (@14.95% effective with 15% surcharge cap u/s 112A). Sale proceeds ₹1978.67L across two tranches in May-25 and Feb-26."},

  ];

  const done    = docs.filter(d=>d.status==='done').length;
  const partial = docs.filter(d=>d.status==='partial').length;

  el.innerHTML = `
  <div class="row g-3 mb-4">

          <span style="font-size:11px;">${done} done · ${partial} partial · ${docs.length-done-partial} missing</span>
        </div>
        <div style="padding:4px 0;">
          ${docs.map(doc => {
            const icon = doc.status==='done'?'check-circle-fill text-success':doc.status==='partial'?'exclamation-circle-fill text-warning':'x-circle text-danger';
            const docLink = doc.file ? `<a href="/data/${doc.file}" target="_blank" style="font-size:10px;color:#1e3a5f;text-decoration:none;"><i class="bi bi-box-arrow-up-right"></i></a>` : '';
            return `<div class="d-flex align-items-center gap-2 px-3 py-1" style="border-bottom:1px solid #f3f4f6;">
              <i class="bi bi-${icon}" style="font-size:13px;flex-shrink:0;"></i>
              <span style="font-size:12px;flex:1;">${doc.name}${doc.note?' <span class="text-muted">('+doc.note+')</span>':''}</span>
              ${docLink}

          }).join('')}
        </div>

    </div>
    <div class="col-md-4">
      <div style="border:1px solid #e5e7eb;border-radius:10px;overflow:hidden;">
        <div style="background:#374151;color:#fff;padding:10px 16px;font-size:13px;font-weight:600;"><i class="bi bi-exclamation-triangle me-2"></i>Action Items</div>
        <div style="padding:8px 10px;">
          ${alerts.map(a=>`
          <div class="alert alert-${a.level} py-2 px-2 mb-2" style="font-size:11.5px;border-radius:6px;">
            <i class="bi bi-${a.level==='danger'?'exclamation-octagon-fill':a.level==='warning'?'exclamation-triangle-fill':'info-circle'} me-1"></i>${a.text}

}

  {label:'Feb 17 2026', shares:27000, price:1215.00, lots:'Lot#2 rem. (1,333@₹962) + Lot#3a (4,598@₹1,035) + Lot#3b (12,017@₹1,062) + Lot#4 (9,052@₹970)', gain:5218000},
];

// LTCG: 12.5% + 15% surcharge + 4% cess = 14.95% eff  (u/s 112A, surcharge capped)
// STCG: 20%  + 15% surcharge + 4% cess = 23.92% eff  (u/s 111A, surcharge capped)
const LTCG_RATE = 0.125 * 1.15 * 1.04;
const STCG_RATE = 0.20  * 1.15 * 1.04;

function renderEsop() {
  const el = document.getElementById('taxViewEsop');
  const today = new Date();
  const fmt = n => '₹' + (n/1e5).toFixed(2) + 'L';
  const fmtCr = n => '₹' + (n/1e7).toFixed(2) + ' Cr';
  const fmtN = n => n.toLocaleString('en-IN');

  const lot8ltcgDate = new Date('2026-11-18');
  const daysToLTCG8 = Math.max(0, Math.ceil((lot8ltcgDate - today) / 86400000));

  // Build lot rows
  let lotRows = ESOP_LOTS.map(l => {
    const allotDate = new Date(l.allotment);
    const daysHeld = Math.floor((today - allotDate) / 86400000);
    const ltcgDate = new Date(allotDate); ltcgDate.setFullYear(ltcgDate.getFullYear()+1);
    const isLTCG = daysHeld >= 365;
    const daysLeft = isLTCG ? 0 : Math.ceil((ltcgDate - today) / 86400000);
    const badge = isLTCG
      ? `<span class="badge bg-success">LTCG ✓</span>`
      : `<span class="badge bg-warning text-dark">STCG — ${daysLeft}d left</span>`;
    return `<tr>
      <td class="fw-semibold">${l.lot} ${l.label}</td>
      <td>${l.allotment}</td>
      <td class="text-end">${fmtN(l.shares)}</td>
      <td class="text-end">₹${l.fmv.toFixed(2)}</td>
      <td class="text-end">${fmt(l.shares * l.fmv)}</td>
      <td class="text-center">${badge}</td>
      <td class="text-end esop-gain-${l.lot.replace('#','')}">—</td>
      <td class="text-end esop-tax-${l.lot.replace('#','')}">—</td>
    </tr>`;
  }).join('');

  // Sold rows
  let soldRows = ESOP_SOLD.map(s => `<tr class="table-light text-muted" style="font-size:12px;">
    <td colspan="2">${s.label} — SOLD (FY26)</td>
    <td class="text-end">${fmtN(s.shares)}</td>
    <td class="text-end">@ ₹${s.price}</td>
    <td class="text-end">${fmt(s.shares * s.price)}</td>
    <td class="text-center"><span class="badge bg-secondary">LTCG ✓</span></td>
    <td class="text-end text-success">${fmt(s.gain)} gain</td>
    <td class="text-end">${fmt(Math.round(s.gain * LTCG_RATE))}</td>
  </tr>`).join('');

  const lot8 = ESOP_LOTS.find(l => l.lot === '#8');
  const lot8SaveHtml = `<div class="alert alert-warning border-0 mt-3" style="background:#fffbeb;">
    <div class="fw-semibold mb-1">⏳ Lot #8 (Nov 2025) — ${daysToLTCG8} days to LTCG (Nov 18, 2026)</div>
    <p class="mb-1 small">This is your largest lot — <strong>${fmtN(lot8.shares)} shares (₹${(lot8.shares*lot8.fmv/1e7).toFixed(1)} Cr cost basis)</strong>. Selling before Nov 18 triggers STCG @23.92% instead of LTCG @14.95% — a <strong>8.97% higher tax</strong> on any gain above the FMV.</p>
    <p class="mb-0 small text-muted">Current price ~₹1,090 is <em>below</em> FMV ₹1,111 — no tax due if sold today (small STCG loss). But if GCPL rises above ₹1,111 before Nov 18, waiting saves significant tax. Adjust the price below to model scenarios.</p>
  </div>`;

  el.innerHTML = `
  <div class="p-3">
    <div class="d-flex align-items-center gap-3 mb-3">
      <h6 class="mb-0 fw-bold">GCPL ESOP Holdings — ${fmtN(ESOP_LOTS.reduce((s,l)=>s+l.shares,0))} shares remaining</h6>
      <div class="d-flex align-items-center gap-2 ms-auto">
        <label class="small text-muted mb-0">Current price ₹</label>
        <input type="number" id="esopPrice" value="1090" step="10" min="500" max="3000"
          class="form-control form-control-sm" style="width:100px;"
          oninput="recalcEsop(this.value)">
        <span class="small text-muted">/ share</span>
      </div>
    </div>

    <div class="table-responsive">
      <table class="table table-sm table-bordered align-middle" style="font-size:13px;">
        <thead class="table-dark">
          <tr>
            <th>Lot</th><th>Allotment</th><th class="text-end">Shares</th>
            <th class="text-end">FMV (cost)</th><th class="text-end">Cost Basis</th>
            <th class="text-center">Status</th><th class="text-end">Gain / (Loss)</th>
            <th class="text-end">Est. Tax</th>
          </tr>
        </thead>
        <tbody>
          ${soldRows}
          <tr class="table-secondary"><td colspan="8" class="fw-semibold small py-1 ps-2">Remaining Lots (as of Apr 1, 2026)</td></tr>
          ${lotRows}
          <tr class="table-dark fw-bold">
            <td colspan="2">TOTAL REMAINING</td>
            <td class="text-end">${fmtN(ESOP_LOTS.reduce((s,l)=>s+l.shares,0))}</td>
            <td colspan="2" class="text-end" id="esopTotalCost">${fmtCr(ESOP_LOTS.reduce((s,l)=>s+l.shares*l.fmv,0))}</td>
            <td></td>
            <td class="text-end" id="esopTotalGain">—</td>
            <td class="text-end" id="esopTotalTax">—</td>
          </tr>
        </tbody>
      </table>
    </div>

    ${lot8SaveHtml}

    <div class="card border-0 shadow-sm mt-3">
      <div class="card-body">
        <h6 class="fw-bold mb-3">📅 Sell Timing — When to Sell to Minimise Tax</h6>
        <div class="row g-3">
          <div class="col-md-6">
            <div class="p-3 rounded" style="background:#f0fdf4;border:1px solid #bbf7d0;">
              <div class="fw-semibold text-success mb-2">✅ Can sell anytime (already LTCG)</div>
              <div class="small">
                <div class="d-flex justify-content-between py-1 border-bottom"><span>Lot #4 Oct-2023 (52,342 shares)</span><span class="text-muted">Crossed Jul 2024</span></div>
                <div class="d-flex justify-content-between py-1 border-bottom"><span>Lot #5 Aug-2024 (38,354 shares)</span><span class="text-muted">Crossed Aug 2025</span></div>
                <div class="d-flex justify-content-between py-1 border-bottom"><span>Lot #6 Oct-2024 (83,751 shares)</span><span class="text-muted">Crossed Oct 2025</span></div>
                <div class="d-flex justify-content-between py-1"><span>Lot #7 Jul-2025 (29,417 shares)</span><span class="text-muted">Crossed Jul 8, 2026 ✓</span></div>
              </div>
              <div class="mt-2 small text-success fw-semibold">203,864 shares — tax @14.95% effective</div>
            </div>
          </div>
          <div class="col-md-6">
            <div class="p-3 rounded" style="background:#fefce8;border:1px solid #fde68a;">
              <div class="fw-semibold text-warning-emphasis mb-2">⏳ Wait until Nov 18, 2026 (${daysToLTCG8} days)</div>
              <div class="small">
                <div class="d-flex justify-content-between py-1 border-bottom"><span>Lot #8 Nov-2025</span><span class="fw-semibold">141,732 shares</span></div>
                <div class="d-flex justify-content-between py-1 border-bottom"><span>FMV (cost basis)</span><span>₹1,111.05/share</span></div>
                <div class="d-flex justify-content-between py-1 border-bottom"><span>STCG rate (if sold now)</span><span class="text-danger">23.92%</span></div>
                <div class="d-flex justify-content-between py-1"><span>LTCG rate (after Nov 18)</span><span class="text-success">14.95%</span></div>
              </div>
              <div class="mt-2 small fw-semibold" id="esopLot8Saving">Enter price above to see tax saving</div>
            </div>
          </div>
        </div>

        <div class="mt-3 p-3 rounded" style="background:#f8fafc;border:1px solid #e2e8f0;">
          <div class="fw-semibold mb-2 small">💡 Additional planning notes</div>
          <ul class="small mb-0" style="padding-left:16px;">
            <li>Each FY gives a fresh <strong>₹1.25L LTCG exemption</strong> — spread large sales across FY boundaries (before/after Apr 1) to claim it twice.</li>
            <li>Your regular income exceeds ₹5 Cr, so <strong>both LTCG and STCG on listed equity carry 15% surcharge</strong> (not 25%) — the differential is purely the base rate: 12.5% vs 20%.</li>
            <li>Lot #8 is currently <strong>below FMV</strong> at ~₹1,090 vs ₹1,111 — selling now produces a STCG <em>loss</em> (₹21/share) usable to offset other STCG gains this year. If you expect GCPL to rise, waiting for LTCG is better.</li>
            <li>Lots #5 & #6 (Aug/Oct 2024) were vested at <strong>₹1,275–₹1,280</strong> — higher than current price (~₹1,090) — so they're currently at a loss. No CGT on these if sold now.</li>
          </ul>
        </div>
      </div>
    </div>
  </div>`;

  recalcEsop(1090);
}

function recalcEsop(price) {
  price = parseFloat(price) || 0;
  const fmt = n => (n >= 0 ? '' : '−') + '₹' + (Math.abs(n)/1e5).toFixed(2) + 'L';
  const fmtCr = n => (n >= 0 ? '' : '−') + '₹' + (Math.abs(n)/1e7).toFixed(2) + ' Cr';
  let totalGain = 0, totalTax = 0;

  ESOP_LOTS.forEach(l => {
    const allotDate = new Date(l.allotment);
    const daysHeld = Math.floor((new Date() - allotDate) / 86400000);
    const isLTCG = daysHeld >= 365;
    const gain = (price - l.fmv) * l.shares;
    const tax  = gain > 0 ? gain * (isLTCG ? LTCG_RATE : STCG_RATE) : 0;
    totalGain += gain; totalTax += tax;
    const gainEl = document.querySelector(`.esop-gain-${l.lot.replace('#','')}`);
    const taxEl  = document.querySelector(`.esop-tax-${l.lot.replace('#','')}`);
    if (gainEl) gainEl.innerHTML = `<span class="${gain>=0?'text-danger':'text-success'}">${fmt(gain)}</span>`;
    if (taxEl)  taxEl.innerHTML  = tax > 0 ? `<span class="text-danger">${fmt(tax)}</span>` : `<span class="text-muted">Nil</span>`;
  });

  const tgEl = document.getElementById('esopTotalGain');
  const ttEl = document.getElementById('esopTotalTax');
  if (tgEl) tgEl.innerHTML = `<span class="${totalGain>=0?'text-danger':'text-success'}">${fmtCr(totalGain)}</span>`;
  if (ttEl) ttEl.innerHTML = totalTax > 0 ? `<span class="text-danger">${fmtCr(totalTax)}</span>` : `<span class="text-muted">Nil</span>`;

  // Lot #8 tax saving if waited for LTCG
  const lot8 = ESOP_LOTS.find(l => l.lot === '#8');
  const lot8gain = (price - lot8.fmv) * lot8.shares;
  const savingEl = document.getElementById('esopLot8Saving');
  if (savingEl && lot8gain > 0) {
    const stcgTax = lot8gain * STCG_RATE;
    const ltcgTax = lot8gain * LTCG_RATE;
    const saving  = stcgTax - ltcgTax;
    savingEl.innerHTML = `<span class="text-success">Waiting saves ₹${(saving/1e5).toFixed(1)}L in tax</span> <span class="text-muted small">(STCG ₹${(stcgTax/1e5).toFixed(1)}L → LTCG ₹${(ltcgTax/1e5).toFixed(1)}L)</span>`;
  } else if (savingEl) {
    savingEl.innerHTML = `<span class="text-muted">Price below FMV — STCG loss of ₹${(Math.abs(lot8gain)/1e5).toFixed(1)}L, no tax either way</span>`;
  }
}
