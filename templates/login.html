<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sitapati Household — Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <style>
    body { background: #1a1a2e; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .login-card { background: white; border-radius: 16px; padding: 40px; width: 100%; max-width: 380px; box-shadow: 0 8px 40px rgba(0,0,0,0.3); }
    .login-card h4 { font-weight: 700; color: #1a1a2e; }
    .form-control { border-radius: 8px; padding: 11px 14px; }
    .form-control:focus { border-color: #1a1a2e; box-shadow: 0 0 0 3px rgba(26,26,46,0.1); }
    .btn-login { background: #1a1a2e; border: none; border-radius: 8px; padding: 12px; font-weight: 600; width: 100%; color: white; font-size: 1rem; }
    .btn-login:hover { background: #2d2d4e; }
    .error-msg { background: #fee2e2; color: #991b1b; border-radius: 8px; padding: 10px 14px; font-size: 0.88rem; }
  </style>
</head>
<body>
<div class="login-card">
  <div class="text-center mb-4">
    <div style="font-size:2.5rem">🏠</div>
    <h4 class="mt-2">Sitapati Household</h4>
    <p class="text-muted small">Expense Manager</p>
  </div>
  {% if error %}
  <div class="error-msg mb-3">{{ error }}</div>
  {% endif %}
  <form method="POST" action="/login">
    <div class="mb-3">
      <label class="form-label fw-500 small">Your name</label>
      <select class="form-select" name="user" required>
        <option value="">Select...</option>
        <option value="vincent">Vincent</option>
        <option value="sudhir">Sudhir</option>
        <option value="ketki">Ketki</option>
        <option value="santosh">Santosh</option>
      </select>
    </div>
    <div class="mb-4">
      <label class="form-label fw-500 small">Password</label>
      <input type="password" class="form-control" name="password" placeholder="Enter password" required/>
    </div>
    <button type="submit" class="btn-login">Sign In</button>
  </form>
</div>
</body>
</html>
