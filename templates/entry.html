<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Submit Expense</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <style>
    body { background: #f5f7fa; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .card { border: none; border-radius: 14px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
    .card-header { background: #1a1a2e; color: white; border-radius: 14px 14px 0 0 !important; padding: 20px 24px; }
    .card-header h5 { margin: 0; font-weight: 600; }
    .form-label { font-weight: 500; font-size: 0.9rem; color: #444; }
    .form-control, .form-select { border-radius: 8px; border: 1px solid #dde; padding: 10px 14px; }
    .form-control:focus, .form-select:focus { border-color: #1a1a2e; box-shadow: 0 0 0 3px rgba(26,26,46,0.1); }
    .btn-primary { background: #1a1a2e; border-color: #1a1a2e; border-radius: 8px; padding: 11px 28px; font-weight: 600; }
    .btn-primary:hover { background: #2d2d4e; border-color: #2d2d4e; }
    .btn-chip { border-radius: 20px; padding: 8px 20px; font-size: 0.88rem; font-weight: 500; margin: 4px; border: 2px solid #1a1a2e; color: #1a1a2e; background: white; cursor: pointer; transition: all 0.15s; }
    .btn-chip:hover, .btn-chip.selected { background: #1a1a2e; color: white; }
    .result-box { border-radius: 10px; padding: 18px 22px; font-size: 0.95rem; font-weight: 500; display: none; }
    .result-auto { background: #dcfce7; border: 1px solid #86efac; color: #166534; }
    .result-pending { background: #fff7ed; border: 1px solid #fdba74; color: #9a3412; }
    .result-question { background: #fefce8; border: 1px solid #fde047; color: #713f12; }
    .result-error { background: #fee2e2; border: 1px solid #fca5a5; color: #991b1b; }
    .radio-group .form-check { display: inline-block; margin-right: 16px; }
    .spinner-border-sm { width: 1rem; height: 1rem; }
    #followup-section { display: none; }
  </style>
</head>
<body>
<div class="container py-4" style="max-width:620px">

  <div class="d-flex justify-content-between align-items-center mb-3">
    <h6 class="text-muted mb-0">Sitapati Household</h6>
    <a href="/dashboard" class="btn btn-sm btn-outline-secondary">Dashboard →</a>
  </div>

  <div class="card mb-4">
    <div class="card-header">
      <h5>📋 Submit an Expense</h5>
      <small style="opacity:0.7">Get approval before paying</small>
    </div>
    <div class="card-body p-4">

      <form id="expense-form">
        <!-- Submitted by -->
        <div class="mb-3">
          <label class="form-label">Submitted by</label>
          <select class="form-select" id="submitter" required>
            <option value="">Select...</option>
            <option value="vincent">Vincent</option>
            <option value="sudhir">Sudhir</option>
            <option value="ketki">Ketki</option>
            <option value="santosh">Santosh</option>
          </select>
        </div>

        <!-- Vendor -->
        <div class="mb-3">
          <label class="form-label">Vendor / Payee</label>
          <input type="text" class="form-control" id="vendor" placeholder="e.g. Raj Electrician" required/>
        </div>

        <!-- Amount -->
        <div class="mb-3">
          <label class="form-label">Estimated Amount (Rs)</label>
          <input type="number" class="form-control" id="amount" placeholder="e.g. 4500" min="1" required/>
        </div>

        <!-- Category -->
        <div class="mb-3">
          <label class="form-label">Category</label>
          <select class="form-select" id="category" required>
            <option value="">Select category...</option>
            <option value="groceries">Groceries</option>
            <option value="utilities">Utilities</option>
            <option value="maintenance">Maintenance</option>
            <option value="staff">Staff</option>
            <option value="dining">Dining</option>
            <option value="transport">Transport</option>
            <option value="medical">Medical</option>
            <option value="entertainment">Entertainment</option>
            <option value="clothing">Clothing</option>
            <option value="education">Education</option>
            <option value="home_repair">Home Repair</option>
            <option value="personal_care">Personal Care</option>
            <option value="gifts">Gifts</option>
            <option value="miscellaneous">Miscellaneous</option>
          </select>
        </div>

        <!-- Description -->
        <div class="mb-3">
          <label class="form-label">Description / Purpose</label>
          <input type="text" class="form-control" id="description" placeholder="e.g. Rewiring kitchen light switches" required/>
          <div class="form-text">Be specific — this is used to check if the price is reasonable.</div>
        </div>

        <!-- Payment method -->
        <div class="mb-3">
          <label class="form-label">Payment Method</label>
          <div class="radio-group">
            <div class="form-check">
              <input class="form-check-input" type="radio" name="payment" id="pay-upi" value="upi" checked/>
              <label class="form-check-label" for="pay-upi">Bank / UPI</label>
            </div>
            <div class="form-check">
              <input class="form-check-input" type="radio" name="payment" id="pay-cash" value="cash"/>
              <label class="form-check-label" for="pay-cash">Cash</label>
            </div>
          </div>
        </div>

        <!-- Already paid -->
        <div class="mb-4">
          <label class="form-label">Already paid?</label>
          <div class="form-check form-switch">
            <input class="form-check-input" type="checkbox" id="post-facto" role="switch"/>
            <label class="form-check-label" for="post-facto">Yes — this is post-facto (already paid)</label>
          </div>
        </div>

        <button type="submit" class="btn btn-primary w-100" id="submit-btn">
          Submit for Approval
        </button>
      </form>

      <!-- Result box -->
      <div class="result-box mt-4" id="result-box"></div>

      <!-- Follow-up section -->
      <div id="followup-section" class="mt-4">
        <div class="result-box result-question" id="followup-box" style="display:block">
          <div class="fw-semibold mb-2">❓ <span id="followup-question"></span></div>
          <div id="followup-options" class="mt-3"></div>
        </div>
      </div>

    </div>
  </div>

</div>

<script>
  let currentRequestId = null;
  let followupRound = 0;

  function showResult(type, html) {
    const box = document.getElementById('result-box');
    box.className = 'result-box mt-4 result-' + type;
    box.innerHTML = html;
    box.style.display = 'block';
    box.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  function showFollowup(question, options, requestId) {
    currentRequestId = requestId;
    document.getElementById('followup-question').textContent = question;
    const optDiv = document.getElementById('followup-options');
    optDiv.innerHTML = '';
    options.forEach(opt => {
      const btn = document.createElement('button');
      btn.className = 'btn-chip';
      btn.textContent = opt;
      btn.onclick = () => submitFollowup(opt);
      optDiv.appendChild(btn);
    });
    document.getElementById('followup-section').style.display = 'block';
    document.getElementById('followup-section').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  function hideFollowup() {
    document.getElementById('followup-section').style.display = 'none';
    followupRound = 0;
  }

  async function submitFollowup(answer) {
    followupRound++;
    document.getElementById('followup-options').querySelectorAll('.btn-chip').forEach(b => {
      b.classList.toggle('selected', b.textContent === answer);
      b.disabled = true;
    });

    const submitBtn = document.getElementById('submit-btn');
    submitBtn.disabled = true;
    submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Checking...';

    try {
      const res = await fetch('/api/submit-expense', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ request_id: currentRequestId, followup_answer: answer, followup_round: followupRound })
      });
      const data = await res.json();
      handleDecision(data);
    } catch (e) {
      showResult('error', '⚠️ Something went wrong. Please try again.');
    } finally {
      submitBtn.disabled = false;
      submitBtn.innerHTML = 'Submit for Approval';
    }
  }

  function handleDecision(data) {
    hideFollowup();
    if (data.action === 'AUTO_APPROVE') {
      showResult('auto', `✅ <strong>Auto-Approved</strong> — you can pay Rs ${Number(data.amount).toLocaleString('en-IN')} to ${data.vendor}.<br><small class="opacity-75">Ref: ${data.request_id}</small>${data.budget_alert ? '<br><span class="badge bg-warning text-dark mt-1">⚠️ Category nearing monthly budget</span>' : ''}`);
    } else if (data.action === 'ESCALATE') {
      showResult('pending', `⏳ <strong>Sent to Sudhir for approval.</strong><br>You will be notified on WhatsApp once a decision is made.<br><small class="opacity-75">Ref: ${data.request_id}</small>${data.market_rate ? `<br><small>Market rate: ${data.market_rate}</small>` : ''}`);
    } else if (data.action === 'PENDING_CLARIFICATION') {
      if (followupRound >= 2) {
        showResult('pending', `⏳ <strong>Sent to Sudhir for approval</strong> with an unclear pricing flag.<br><small class="opacity-75">Ref: ${data.request_id}</small>`);
      } else {
        showFollowup(data.follow_up_question, data.follow_up_options, data.request_id);
      }
    } else {
      showResult('error', '⚠️ Unexpected response. Please try again or contact Sudhir.');
    }
  }

  document.getElementById('expense-form').addEventListener('submit', async function(e) {
    e.preventDefault();
    hideFollowup();
    document.getElementById('result-box').style.display = 'none';

    const btn = document.getElementById('submit-btn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Checking...';

    const payload = {
      submitter: document.getElementById('submitter').value,
      vendor: document.getElementById('vendor').value,
      amount: parseFloat(document.getElementById('amount').value),
      category: document.getElementById('category').value,
      description: document.getElementById('description').value,
      payment_method: document.querySelector('input[name="payment"]:checked').value,
      is_post_facto: document.getElementById('post-facto').checked,
    };

    try {
      const res = await fetch('/api/submit-expense', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      const data = await res.json();
      handleDecision(data);
      if (data.action !== 'PENDING_CLARIFICATION') {
        this.reset();
        followupRound = 0;
      }
    } catch (err) {
      showResult('error', '⚠️ Could not reach server. Please try again.');
    } finally {
      btn.disabled = false;
      btn.innerHTML = 'Submit for Approval';
    }
  });
</script>
</body>
</html>
