<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ACC27 Enrichment</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
<style>
body { background:#f8f9fa; padding:20px; }
.match-exact { background:#d1f5d3; }
.match-good  { background:#fff9c4; }
.match-weak  { background:#ffe0cc; }
.match-none  { background:#f8d7da; }
th.sortable { cursor:pointer; user-select:none; }
</style>
</head>
<body>
<div class="container-xl">
  <div class="d-flex align-items-center mb-3 gap-3">
    <h5 class="mb-0 fw-bold"><i class="bi bi-file-earmark-spreadsheet me-2"></i>ACC27 → Ledger Enrichment</h5>
    <a href="/" class="btn btn-sm btn-outline-secondary ms-auto">← Back to App</a>
  </div>

  <!-- Upload -->
  <div class="card mb-3">
    <div class="card-body">
      <div class="d-flex align-items-center gap-3 flex-wrap">
        <div>
          <label class="form-label small fw-semibold mb-1">Upload _ACC 27.xlsx</label>
          <input type="file" id="xlFile" class="form-control form-control-sm" accept=".xlsx" style="width:280px">
        </div>
        <div class="align-self-end">
          <button class="btn btn-sm btn-primary" onclick="loadPreview()"><i class="bi bi-search me-1"></i>Preview matches</button>
        </div>
        <div class="align-self-end ms-2" id="applyZone" style="display:none">
          <button class="btn btn-sm btn-success" onclick="applyAll()"><i class="bi bi-check-circle me-1"></i>Apply all exact+good</button>
        </div>
      </div>
      <div id="uploadMsg" class="small text-muted mt-2"></div>
    </div>
  </div>

  <!-- Summary tiles -->
  <div class="row g-2 mb-3" id="tiles" style="display:none">
    <div class="col-6 col-md-3"><div class="card border-0 bg-white"><div class="card-body py-2 px-3">
      <div class="text-muted small">Excel entries</div><div class="fw-bold" id="tTotal">—</div>
    </div></div></div>
    <div class="col-6 col-md-3"><div class="card border-0 bg-success bg-opacity-10"><div class="card-body py-2 px-3">
      <div class="text-muted small">Exact matches (≤3d)</div><div class="fw-bold text-success" id="tExact">—</div>
    </div></div></div>
    <div class="col-6 col-md-3"><div class="card border-0 bg-warning bg-opacity-10"><div class="card-body py-2 px-3">
      <div class="text-muted small">Good matches (≤14d)</div><div class="fw-bold text-warning" id="tGood">—</div>
    </div></div></div>
    <div class="col-6 col-md-3"><div class="card border-0 bg-danger bg-opacity-10"><div class="card-body py-2 px-3">
      <div class="text-muted small">No match</div><div class="fw-bold text-danger" id="tNone">—</div>
    </div></div></div>
  </div>

  <!-- Filter + debug -->
  <div class="d-flex gap-2 mb-2 align-items-center" id="filterBar" style="display:none!important">
    <div class="btn-group btn-group-sm">
      <button class="btn btn-outline-secondary active" onclick="filterRows('all',this)">All</button>
      <button class="btn btn-outline-success" onclick="filterRows('exact',this)">Exact</button>
      <button class="btn btn-outline-warning" onclick="filterRows('good',this)">Good</button>
      <button class="btn btn-outline-danger" onclick="filterRows('none',this)">No match</button>
    </div>
    <button class="btn btn-sm btn-outline-secondary ms-auto" onclick="debugLedger()"><i class="bi bi-bug me-1"></i>Debug ledger</button>
  </div>

  <!-- Results table -->
  <div class="table-responsive">
  <table class="table table-sm table-bordered mb-0 small" id="resultsTable" style="display:none">
    <thead class="table-dark">
      <tr>
        <th>Conf.</th>
        <th>Gap</th>
        <th>XL Date</th>
        <th>Seq #</th>
        <th>Ledger Date</th>
        <th>Account</th>
        <th>Amount</th>
        <th>Ledger Raw Desc</th>
        <th>XL Description</th>
        <th>Type</th>
        <th>Heading / Action</th>
      </tr>
    </thead>
    <tbody id="resultsBody"></tbody>
  </table>
  </div>
  <div id="statusMsg" class="mt-3 fw-semibold"></div>
  <pre id="debugOut" class="bg-dark text-light p-3 small mt-3" style="display:none;max-height:400px;overflow:auto"></pre>
</div>

<script>
let _allResults = [];

async function loadPreview() {
  const f = document.getElementById('xlFile').files[0];
  if (!f) { alert('Choose a file first'); return; }
  const msg = document.getElementById('uploadMsg');
  msg.textContent = 'Uploading and matching…';

  const fd = new FormData();
  fd.append('file', f);
  fd.append('limit', '9999');

  try {
    const r = await fetch('/api/admin/acc27-match-preview', { method:'POST', body: fd });
    const d = await r.json();

    // Combine matched + unmatched for display
    const matched   = d.results || [];
    const unmatched = d.unmatched || [];
    _allResults = [...matched, ...unmatched];

    const exact = matched.filter(x => x.match === 'exact').length;
    const good  = matched.filter(x => x.match === 'good').length;
    const none  = (d.unmatched_count || 0);

    document.getElementById('tTotal').textContent = d.total_xl || 0;
    document.getElementById('tExact').textContent = exact + ' (will apply)';
    document.getElementById('tGood').textContent  = good + ' (→ Not Sure)';
    document.getElementById('tNone').textContent  = none;
    document.getElementById('tiles').style.display = '';
    document.getElementById('applyZone').style.display = '';
    document.getElementById('resultsTable').style.display = '';
    document.getElementById('filterBar').style.display = '';

    renderTable(_allResults);
    msg.textContent = `Matched ${matched.length} of ${d.total_xl} entries (${none} unmatched).`;
  } catch(e) {
    msg.textContent = 'Error: ' + e;
  }
}

function filterRows(type, btn) {
  document.querySelectorAll('#filterBar .btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const rows = type === 'all' ? _allResults : _allResults.filter(r => r.match === type);
  renderTable(rows);
}

function renderTable(rows) {
  const tbody = document.getElementById('resultsBody');
  const confBadge = c => c === 'exact' ? '<span class="badge bg-success">exact</span>'
    : c === 'good'  ? '<span class="badge bg-warning text-dark">good</span>'
    : c === 'weak'  ? '<span class="badge bg-secondary">weak</span>'
    : '<span class="badge bg-danger">no match</span>';

  tbody.innerHTML = rows.map(m => {
    const xl = m.xl || m, ld = m.ledger || {};
    const isNone = m.match === 'none';
    const typeDiff = !isNone && xl.type !== (ld.type || '').toLowerCase();
    const headDiff = !isNone && xl.heading !== (ld.heading || '');
    return `<tr class="match-${m.match}">
      <td>${confBadge(m.match)}</td>
      <td class="text-center">${isNone ? '—' : (m.days_gap ?? '—') + 'd'}</td>
      <td>${xl.date}</td>
      <td class="fw-semibold">${isNone ? '—' : '#' + (ld.seq ?? '—')}</td>
      <td>${ld.date ?? '—'}</td>
      <td><small>${ld.account ?? '—'}</small></td>
      <td class="text-end">₹${(xl.amount||0).toLocaleString('en-IN')}</td>
      <td class="text-muted" style="max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${ld.raw_description||''}">${ld.raw_description||'—'}</td>
      <td style="max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${xl.description||''}">${xl.description||'—'}</td>
      <td>${!isNone && typeDiff ? `<span class="text-muted">${ld.type||'—'}</span> → <strong>${xl.type}</strong>` : `<span class="text-muted">${ld.type||xl.type||'—'}</span>`}</td>
      <td>${m.match === 'exact'
        ? (headDiff ? `<span class="text-muted">${ld.heading||'—'}</span> → <strong>${xl.heading}</strong>` : `<span class="text-muted">${xl.heading}</span>`)
        : isNone ? '<span class="text-muted">—</span>'
        : `<span class="badge bg-warning text-dark">→ Not Sure (Vincent)</span>`}</td>
    </tr>`;
  }).join('');
}

async function debugLedger() {
  const f = document.getElementById('xlFile').files[0];
  const out = document.getElementById('debugOut');
  out.style.display = '';
  out.textContent = 'Loading…';
  const fd = new FormData();
  if (f) fd.append('file', f);
  const r = await fetch('/api/admin/acc27-debug', { method: f ? 'POST' : 'GET', body: f ? fd : undefined });
  const d = await r.json();
  out.textContent = JSON.stringify(d, null, 2);
}

async function applyAll() {
  if (!confirm('Apply all exact+good matches? This will update the master ledger.')) return;
  const f = document.getElementById('xlFile').files[0];
  if (!f) { alert('File no longer available — re-select the file'); return; }
  const msg = document.getElementById('statusMsg');
  msg.textContent = 'Applying…'; msg.className = 'mt-3 fw-semibold text-muted';

  const fd = new FormData();
  fd.append('file', f);
  fd.append('apply', '1');
  fd.append('limit', '9999');

  const r = await fetch('/api/admin/acc27-match-preview', { method:'POST', body: fd });
  const d = await r.json();
  msg.textContent = `✓ Applied ${d.applied} of ${d.total} entries.`;
  msg.className = 'mt-3 fw-semibold text-success';
}
</script>
</body>
</html>
